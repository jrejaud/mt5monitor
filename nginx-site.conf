server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Clean URLs: /privacy -> /privacy.html
    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    # Branded error page (generated by build-extras)
    error_page 404 /404.html;
    location = /404.html { internal; }

    # security.txt is served from /.well-known/ as a static file (no special config).

    # --- Security headers (applied to every response) ---
    # NOTE: nginx resets inherited add_header directives inside any location that
    # declares its own — keep all add_header at server scope so they apply globally.
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: https:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; font-src 'self' data:; connect-src 'self' https:; frame-ancestors 'none'; base-uri 'self'; form-action 'self' https:" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options "DENY" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    # (Deliberately no per-location add_header: nginx would reset the inherited
    #  security headers for that location. Keep all headers at server scope.)
}
